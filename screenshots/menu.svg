<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" font-family="JetBrains Mono, Courier New, monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" rx="10"/>
  <!-- Title bar -->
  <rect width="800" height="32" fill="#21262d" rx="10"/>
  <rect y="10" width="800" height="22" fill="#21262d"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#8b949e" font-size="12">Termux — QuinxOS v6.0</text>

  <!-- Title -->
  <text x="400" y="70" text-anchor="middle" fill="#00e5ff" font-size="28" font-weight="bold" letter-spacing="4">QuinxOS</text>
  <text x="400" y="92" text-anchor="middle" fill="#8b949e" font-size="11">The Ultimate Termux Customization Suite</text>

  <!-- Badges -->
  <rect x="280" y="102" width="50" height="16" rx="8" fill="#00e5ff" fill-opacity="0.15" stroke="#00e5ff" stroke-width="1"/>
  <text x="305" y="114" text-anchor="middle" fill="#00e5ff" font-size="10" font-weight="bold">v6.0</text>
  <rect x="338" y="102" width="60" height="16" rx="8" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1"/>
  <text x="368" y="114" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="bold">22 themes</text>
  <rect x="406" y="102" width="65" height="16" rx="8" fill="#2ed573" fill-opacity="0.15" stroke="#2ed573" stroke-width="1"/>
  <text x="438" y="114" text-anchor="middle" fill="#2ed573" font-size="10" font-weight="bold">14 plugins</text>

  <!-- Menu box -->
  <rect x="40" y="130" width="720" height="310" rx="8" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>

  <!-- Menu title -->
  <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">MAIN MENU</text>
  <line x1="60" y1="163" x2="740" y2="163" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>

  <!-- Menu items -->
  <g font-size="12">
    <text x="65" y="185" fill="#00e5ff">[01]</text><text x="100" y="185" fill="#2ed573">Core Setup</text><text x="400" y="185" fill="#8b949e">Install base dependencies</text>
    <text x="65" y="205" fill="#00e5ff">[02]</text><text x="100" y="205" fill="#2ed573">Zsh Config</text><text x="400" y="205" fill="#8b949e">Configure shell</text>
    <text x="65" y="225" fill="#00e5ff">[03]</text><text x="100" y="225" fill="#2ed573">Switch to Zsh</text><text x="400" y="225" fill="#8b949e">Default shell</text>
    <text x="65" y="245" fill="#00e5ff">[08]</text><text x="100" y="245" fill="#a855f7">Theme Gallery (22)</text><text x="400" y="245" fill="#8b949e">Color schemes</text>
    <text x="65" y="265" fill="#00e5ff">[11]</text><text x="100" y="265" fill="#a855f7">Anime Themes</text><text x="400" y="265" fill="#8b949e">7 anime palettes</text>
    <text x="65" y="285" fill="#00e5ff">[15]</text><text x="100" y="285" fill="#2ed573">Plugin System (14)</text><text x="400" y="285" fill="#8b949e">Extensions</text>
    <text x="65" y="305" fill="#00e5ff">[18]</text><text x="100" y="305" fill="#00e5ff">Live Dashboard</text><text x="400" y="305" fill="#8b949e">System monitor</text>
    <text x="65" y="325" fill="#00e5ff">[28]</text><text x="100" y="325" fill="#a855f7">Fun Stuff</text><text x="400" y="325" fill="#8b949e">Anime, Matrix, facts</text>
    <text x="65" y="345" fill="#00e5ff">[32]</text><text x="100" y="345" fill="#ff4757">Quinx Shield</text><text x="400" y="345" fill="#8b949e">Terminal lock</text>
    <text x="65" y="365" fill="#00e5ff">[35]</text><text x="100" y="365" fill="#2ed573">Command Palette</text><text x="400" y="365" fill="#8b949e">Search features</text>
    <text x="65" y="385" fill="#00e5ff">[38]</text><text x="100" y="385" fill="#ffa502">RGB Animation</text><text x="400" y="385" fill="#8b949e">Preview effect</text>
  </g>

  <line x1="60" y1="395" x2="740" y2="395" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <text x="65" y="415" fill="#00e5ff" font-size="12">[00]</text><text x="100" y="415" fill="#ff4757" font-size="12">Exit</text><text x="400" y="415" fill="#8b949e" font-size="12">Close terminal</text>

  <!-- Prompt -->
  <text x="40" y="450" fill="#00e5ff" font-size="11">  ┌─ ❯ </text>
  <rect x="82" y="438" width="8" height="14" fill="#00e5ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Persistent header -->
  <rect x="40" y="465" width="720" height="20" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="479" fill="#8b949e" font-size="10">[21:36:07] IP:192.168.1.5 BAT:85% RAM:1.2G/4G Git:[main]</text>

  <!-- Anime quote -->
  <text x="40" y="510" fill="#a855f7" font-size="10">💬 "The world isn't perfect. But it's there for us, doing the best it can."</text>
  <text x="40" y="525" fill="#8b949e" font-size="9">   — Fullmetal Alchemist</text>
  <text x="40" y="555" fill="#484f58" font-size="9">QuinxOS v6.0 • 38 features • 22 themes • 14 plugins</text>
</svg>