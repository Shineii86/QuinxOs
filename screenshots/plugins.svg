<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" font-family="JetBrains Mono, monospace" font-size="13">
  <rect width="800" height="600" fill="#0d1117" rx="10"/>
  <rect width="800" height="32" fill="#21262d" rx="10"/>
  <rect y="10" width="800" height="22" fill="#21262d"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#8b949e" font-size="12">Termux — QuinxOS Plugins</text>
  <!-- Title -->
  <text x="40" y="60" fill="#2ed573" font-size="14" font-weight="bold">🧩 Plugin System — 14 Built-in Plugins</text>
  <!-- Plugin table header -->
  <rect x="40" y="75" width="720" height="22" rx="4" fill="#161b22"/>
  <text x="55" y="90" fill="#8b949e" font-size="10" font-weight="bold">COMMAND</text>
  <text x="240" y="90" fill="#8b949e" font-size="10" font-weight="bold">PLUGIN</text>
  <text x="370" y="90" fill="#8b949e" font-size="10" font-weight="bold">DESCRIPTION</text>
  <!-- Plugin rows -->
  <text x="55" y="115" fill="#00e5ff" font-size="10">quinx-weather &lt;city&gt;</text>
  <text x="240" y="115" fill="#ffffff" font-size="10">Weather</text>
  <text x="370" y="115" fill="#8b949e" font-size="10">Current weather for any city</text>
  <text x="55" y="135" fill="#00e5ff" font-size="10">quinx-extract &lt;file&gt;</text>
  <text x="240" y="135" fill="#ffffff" font-size="10">Extract</text>
  <text x="370" y="135" fill="#8b949e" font-size="10">Universal archive extractor (tar, zip, rar, 7z)</text>
  <text x="55" y="155" fill="#00e5ff" font-size="10">quinx-ports [host]</text>
  <text x="240" y="155" fill="#ffffff" font-size="10">Ports</text>
  <text x="370" y="155" fill="#8b949e" font-size="10">Quick port scanner</text>
  <text x="55" y="175" fill="#00e5ff" font-size="10">quinx-calc 'expr'</text>
  <text x="240" y="175" fill="#ffffff" font-size="10">Calculator</text>
  <text x="370" y="175" fill="#8b949e" font-size="10">Math expressions with bc</text>
  <text x="55" y="195" fill="#00e5ff" font-size="10">quinx-qr 'text'</text>
  <text x="240" y="195" fill="#ffffff" font-size="10">QR Code</text>
  <text x="370" y="195" fill="#8b949e" font-size="10">Generate QR codes from text</text>
  <text x="55" y="215" fill="#00e5ff" font-size="10">quinx-timer &lt;secs&gt;</text>
  <text x="240" y="215" fill="#ffffff" font-size="10">Timer</text>
  <text x="370" y="215" fill="#8b949e" font-size="10">Countdown timer + stopwatch</text>
  <text x="55" y="235" fill="#00e5ff" font-size="10">quinx-pass [len]</text>
  <text x="240" y="235" fill="#ffffff" font-size="10">Password</text>
  <text x="370" y="235" fill="#8b949e" font-size="10">Random password generator</text>
  <text x="55" y="255" fill="#00e5ff" font-size="10">quinx-note add/list</text>
  <text x="240" y="255" fill="#ffffff" font-size="10">Notes</text>
  <text x="370" y="255" fill="#8b949e" font-size="10">Quick note-taking system</text>
  <text x="55" y="275" fill="#00e5ff" font-size="10">quinx-color '#hex'</text>
  <text x="240" y="275" fill="#ffffff" font-size="10">Color Info</text>
  <text x="370" y="275" fill="#8b949e" font-size="10">Color converter with preview</text>
  <text x="55" y="295" fill="#00e5ff" font-size="10">quinx-report</text>
  <text x="240" y="295" fill="#ffffff" font-size="10">Sys Report</text>
  <text x="370" y="295" fill="#8b949e" font-size="10">Full system report (saved to file)</text>
  <text x="55" y="315" fill="#00e5ff" font-size="10">quinx-define &lt;word&gt;</text>
  <text x="240" y="315" fill="#ffffff" font-size="10">Dictionary</text>
  <text x="370" y="315" fill="#8b949e" font-size="10">English dictionary lookup</text>
  <!-- New in v6.0 -->
  <text x="55" y="340" fill="#ff4757" font-size="10">quinx-gh &lt;cmd&gt;</text>
  <text x="240" y="340" fill="#ff4757" font-size="10">GitHub</text>
  <text x="370" y="340" fill="#ff4757" font-size="10">Quick git init, commit, and push ★ NEW</text>
  <text x="55" y="360" fill="#ff4757" font-size="10">quinx-game</text>
  <text x="240" y="360" fill="#ff4757" font-size="10">Games</text>
  <text x="370" y="360" fill="#ff4757" font-size="10">Snake, Tetris, Pong in terminal ★ NEW</text>
  <text x="55" y="380" fill="#ff4757" font-size="10">quinx-ai 'query'</text>
  <text x="240" y="380" fill="#ff4757" font-size="10">AI Assistant</text>
  <text x="370" y="380" fill="#ff4757" font-size="10">Quick answers, jokes, and trivia ★ NEW</text>
  <!-- Custom plugin example -->
  <text x="40" y="420" fill="#a855f7" font-size="11" font-weight="bold">Create Your Own Plugin:</text>
  <rect x="40" y="430" width="400" height="90" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="55" y="448" fill="#8b949e" font-size="10"># .object/plugins/my-plugin.sh</text>
  <text x="55" y="463" fill="#ff79c6" font-size="10">#!/bin/bash</text>
  <text x="55" y="478" fill="#2ed573" font-size="10">quinx-hello() {</text>
  <text x="75" y="493" fill="#f1fa8c" font-size="10">echo "Hello from QuinxOS!"</text>
  <text x="55" y="508" fill="#2ed573" font-size="10">}</text>
  <!-- Prompt -->
  <text x="40" y="550" fill="#00e5ff" font-size="11">❯ quinx-weather Tokyo</text>
  <text x="40" y="568" fill="#ffffff" font-size="10">🌤️  Tokyo: 22°C, Partly cloudy, Humidity 65%</text>
  <text x="40" y="590" fill="#484f58" font-size="9">QuinxOS v6.0 • Drop .sh files in .object/plugins/ • Auto-loads on terminal start</text>
</svg>