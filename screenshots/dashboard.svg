  <text x="85" y="376" fill="#a855f7" font-size="12">▸ Git:</text>
  <text x="200" y="376" fill="#2ed573" font-size="12">main</text>
  <text x="260" y="376" fill="#8b949e" font-size="11">• 6 commits • clean</text>

  <!-- Refresh hint -->
  <text x="60" y="415" fill="#484f58" font-size="10">Refreshing every 2s... Press [Q] to quit • [R] to refresh now</text>

  <!-- Persistent header below -->
  <rect x="60" y="435" width="680" height="20" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="449" fill="#8b949e" font-size="10">[21:36:09] IP:192.168.1.5 BAT:85% RAM:1.2G/4G Git:[main]</text>

  <text x="60" y="580" fill="#484f58" font-size="9">QuinxOS v6.0 • Live Dashboard</text>
</svg>