<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" font-family="JetBrains Mono, Courier New, monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" rx="10"/>
  <rect width="800" height="32" fill="#21262d" rx="10"/>
  <rect y="10" width="800" height="22" fill="#21262d"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#8b949e" font-size="12">Termux — QuinxOS Live Dashboard</text>

  <!-- Dashboard box -->
  <rect x="60" y="48" width="680" height="340" rx="8" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">QUINXOS LIVE DASHBOARD v6.0</text>
  <line x1="80" y1="82" x2="720" y2="82" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>

  <!-- Time -->
  <text x="85" y="105" fill="#a855f7" font-size="12">▸ Time:</text>
  <text x="200" y="105" fill="#ffffff" font-size="12">2026-05-02 21:36:07</text>

  <!-- CPU -->
  <text x="85" y="128" fill="#a855f7" font-size="12">▸ CPU:</text>
  <text x="200" y="128" fill="#2ed573" font-size="12">12%</text>
  <rect x="260" y="117" width="200" height="14" rx="3" fill="#21262d"/>
  <rect x="260" y="117" width="24" height="14" rx="3" fill="#2ed573"/>
  <text x="480" y="128" fill="#8b949e" font-size="11">Load: 0.5 0.3 0.2</text>

  <!-- Memory -->
  <text x="85" y="151" fill="#a855f7" font-size="12">▸ Memory:</text>
  <text x="200" y="151" fill="#00e5ff" font-size="12">1200MB / 4096MB (29%)</text>
  <rect x="430" y="140" width="200" height="14" rx="3" fill="#21262d"/>
  <rect x="430" y="140" width="58" height="14" rx="3" fill="#00e5ff"/>

  <!-- Disk -->
  <text x="85" y="174" fill="#a855f7" font-size="12">▸ Disk:</text>
  <text x="200" y="174" fill="#ffa502" font-size="12">8.2G / 64G (13%)</text>
  <rect x="400" y="163" width="200" height="14" rx="3" fill="#21262d"/>
  <rect x="400" y="163" width="26" height="14" rx="3" fill="#ffa502"/>

  <!-- Battery -->
  <text x="85" y="197" fill="#a855f7" font-size="12">▸ Battery:</text>
  <text x="200" y="197" fill="#2ed573" font-size="12">85%</text>
  <text x="260" y="197" fill="#8b949e" font-size="11">Charging • Temp: 32°C • Health: Good</text>

  <!-- Network -->
  <text x="85" y="220" fill="#a855f7" font-size="12">▸ Network:</text>
  <text x="200" y="220" fill="#ffffff" font-size="12">IP: 192.168.1.5</text>
  <text x="380" y="220" fill="#8b949e" font-size="11">WiFi: MyNetwork (5GHz)</text>

  <!-- Processes -->
  <text x="85" y="243" fill="#a855f7" font-size="12">▸ Processes:</text>
  <text x="200" y="243" fill="#ffffff" font-size="12">142 total, 3 running, 139 sleeping</text>

  <!-- Top Processes header -->
  <text x="85" y="268" fill="#a855f7" font-size="12">▸ Top Processes:</text>
  <rect x="95" y="275" width="590" height="55" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="292" fill="#8b949e" font-size="10">PID     CPU%    MEM%    COMMAND</text>
  <text x="110" y="307" fill="#ffffff" font-size="10">1847     8.2     4.1     zsh</text>
  <text x="110" y="320" fill="#ffffff" font-size="10">2103     3.1     2.8     node</text>

  <!-- Uptime -->
  <text x="85" y="353" fill="#a855f7" font-size="12">▸ Uptime:</text>
  <text x="200" y="353" fill="#ffffff" font-size="12">3d 14h 22m</text>

