name: ShellCheck Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck -s bash -S warning install.sh || true

      - name: Lint plugin scripts
        run: |
          for f in .object/plugins/*.sh; do
            [ -f "$f" ] && echo "Checking $f..." && shellcheck -s bash -S warning "$f" || true
          done
